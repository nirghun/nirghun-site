<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact | [Your Name]</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;500;700&display=swap');
        body { background-color: #080808; color: #fff; font-family: 'Space Grotesk', sans-serif; }
        .contact-link:hover { transform: translateX(10px); color: #71717a; }
        .contact-link { transition: all 0.3s ease; }
    </style>
</head>
<body>
    <!-- Nav -->
    <nav class="p-6 flex justify-between items-center max-w-7xl mx-auto uppercase tracking-widest text-[10px]">
        <a href="index.html" class="font-bold text-lg">YOUR NAME</a>
        <div class="space-x-6 hidden md:flex">
            <a href="direction.html" class="hover:text-zinc-400">Direction</a>
            <a href="cinematography.html" class="hover:text-zinc-400">Cinematography</a>
            <a href="videography.html" class="hover:text-zinc-400">Videography</a>
            <a href="photography.html" class="hover:text-zinc-400">Photography</a>
            <a href="contact.html" class="text-white border-b border-white">Contact</a>
        </div>
    </nav>

    <!-- Content -->
    <section class="max-w-4xl mx-auto px-6 py-32">
        <h2 class="text-7xl font-bold mb-16 tracking-tighter uppercase">Let's <br><span class="text-zinc-800">Collaborate</span>.</h2>
        
        <div class="space-y-8">
            <!-- Email -->
            <a href="mailto:hello@yourname.com" class="contact-link block text-3xl md:text-5xl font-light border-b border-white/10 pb-6">
                hello@yourname.com
            </a>

            <!-- Social Grid -->
            <div class="grid grid-cols-1 md:grid-cols-2 gap-12 pt-12">
                <div>
                    <p class="text-[10px] text-zinc-500 tracking-[0.4em] uppercase mb-6">Industry</p>
                    <div class="space-y-4">
                        <a href="YOUR_IMDB_LINK" class="block hover:text-zinc-400 font-bold tracking-tight">IMDb Portfolio &rarr;</a>
                        <a href="YOUR_LINKEDIN_LINK" class="block hover:text-zinc-400 font-bold tracking-tight">LinkedIn Profile &rarr;</a>
                    </div>
                </div>
                <div>
                    <p class="text-[10px] text-zinc-500 tracking-[0.4em] uppercase mb-6">Social & Instant</p>
                    <div class="space-y-4">
                        <a href="YOUR_INSTAGRAM_LINK" class="block hover:text-zinc-400 font-bold tracking-tight">Instagram @YourHandle &rarr;</a>
                        <a href="https://wa.me/YOUR_PHONE_NUMBER" class="block text-green-500 hover:text-green-400 font-bold tracking-tight italic">Chat on WhatsApp &rarr;</a>
                    </div>
                </div>
            </div>
        </div>

        <p class="mt-40 text-center text-[10px] text-zinc-700 tracking-[0.5em] uppercase">Based in [Your City] — Available Worldwide</p>
    </section>
</body>
</html>
